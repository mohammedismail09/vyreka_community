{% load static %}

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Partnerships | Vyreka</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="{% static 'home/style.css' %}">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#004395",

                        "on-primary-fixed": "#23005c",

                        "error-container": "#93000a",
                        "primary-container": "#a078ff",
                        "error": "#ffb4ab",

                        "on-error": "#690005",
                        "inverse-surface": "#dae2fd",
                        "outline-variant": "#494454",
                        "tertiary-fixed": "#ffdcbb",
                        "secondary-container": "#0566d9",

                        "on-tertiary": "#482900",

                        "on-tertiary-fixed": "#2c1700",
                        "surface-container-high": "#222a3d",
                        "outline": "#958ea0",
                        "on-tertiary-container": "#3f2300",

                        "surface-container-highest": "#2d3449",
                        "background": "#0b1326",
                        "surface-container": "#171f33",
                        "inverse-on-surface": "#283044",
                        "on-secondary": "#002e6a",
                        "on-primary-fixed-variant": "#5516be",
                        "on-surface-variant": "#cbc3d7",

                    "borderRadius": {

                        "stack-lg": "32px",

<body class="bg-gray-50 text-gray-900 dark:bg-background dark:text-on-background font-body-md transition-colors duration-300 min-h-screen flex flex-col justify-between">


<main class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-background font-body-md p-6 transition-colors duration-300">
    <div class="max-w-md w-full text-center space-y-6">
        
        <!-- Playful Cartoon Spacer Element -->
        <div class="relative w-40 h-40 mx-auto flex items-center justify-center bg-purple-100 dark:bg-surface-container/60 border border-purple-200 dark:border-outline-variant/30 rounded-full animate-pulse">
            <!-- Cartoon Worker Icon using Material Symbols -->
            <span class="material-symbols-outlined text-6xl text-purple-900 dark:text-primary animate-bounce" style="animation-duration: 2s;">construction</span>
            
            <!-- Floating absolute gear accents -->
            <span class="material-symbols-outlined text-2xl text-amber-500 absolute top-4 right-4 animate-spin" style="animation-duration: 6s;">settings</span>
            <span class="material-symbols-outlined text-xl text-indigo-400 absolute bottom-6 left-4 animate-spin" style="animation-duration: 3s; animation-direction: reverse;">settings</span>
        </div>

        <!-- Typography Messaging Block -->
        <div class="space-y-3">
            <span class="inline-block bg-purple-200 text-purple-900 dark:bg-primary/20 dark:text-primary text-xs font-bold tracking-widest px-3 py-1 rounded-full uppercase">
                Under Development
            </span>
            <h2 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-on-surface">
                Brb, cooking something cool!
            </h2>
            <p class="text-body-md text-gray-600 dark:text-on-surface-variant leading-relaxed">
Our partnerships space is under development. Please check back later or, if it's urgent, contact us via <a href="{% url 'contact' %}"><u>contact page</u></a>.            </p>
        </div>

        <!-- Single Navigation Element Match Screen Details -->
        <div class="pt-2">
            <a href="/" class="inline-flex items-center justify-center gap-2 bg-purple-200 text-purple-900 hover:bg-purple-300 dark:bg-primary dark:text-on-primary px-8 py-3 rounded-full font-bold transition-all transform scale-100 active:scale-95 shadow-sm">
                Take Me Home <span class="material-symbols-outlined text-sm">home</span>
            </a>
        </div>

    </div>
</main>

<script src="{% static 'home/script.js' %}"></script>

</body>
</html>
